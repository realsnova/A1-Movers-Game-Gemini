<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>A1 Movers 單字冒險</title>
    <!-- INJECT_CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js"></script>
</head>
<body>
    <!-- DQ11 Style BGM -->
    <audio id="bgm" loop preload="auto">
        <!-- INJECT_BGM -->
    </audio>

    <div id="game-container">
        <!-- Cinematic Intro Screen -->
        <div id="screen-intro-cinematic" class="screen cinematic-screen hidden">
            <div id="cinematic-text-container" class="cinematic-text-container">
                <p id="cinematic-text" class="cinematic-text pixel-text"></p>
            </div>
            <button class="small-btn btn-ghost skip-btn" onclick="Game.skipIntro()">跳過劇情 (Skip)</button>
        </div>
        
        <!-- Error Reporter -->
        <div id="error-reporter" class="error-reporter" style="display:none;"></div>
        <script>
            window.onerror = function(msg, url, lineNo, columnNo, error) {
                var el = document.getElementById('error-reporter');
                el.style.display = 'block';
                el.innerHTML += '<p>' + msg + ' (Line: ' + lineNo + ')</p>';
                return false;
            };
        </script>
        
        <!-- Top Bar -->
        <div id="top-bar" class="hidden">
            <div class="stats">
                <span id="stat-caught" title="收服的寶可夢">🔴 0</span>
                <span id="stat-words" title="學會的單字">📖 0</span>
                <span id="stat-gold" title="金幣">💰 0</span>
                <span id="stat-badges" title="徽章">🎖️ 0</span>
            </div>
            <div class="nav-buttons">
                <button id="btn-sound-toggle" class="nav-btn pixel-text ripple" onclick="Game.toggleSound()">🔊</button>
                <button class="nav-btn pixel-text ripple" onclick="Game.showScreen('map')">地圖</button>
                <button class="nav-btn pixel-text ripple" onclick="Game.showScreen('pokedex')">圖鑑</button>
                <button class="nav-btn pixel-text ripple" onclick="Game.showScreen('shop')">商店</button>
                <button class="nav-btn pixel-text ripple" onclick="Game.showScreen('dashboard')">儀表板</button>
            </div>
        </div>

        <!-- Title Screen -->
        <div id="screen-title" class="screen">
            <h1 class="screen-title-logo pixel-text title-text">A1 Movers<br>單字冒險</h1>
            <button class="big-btn btn-primary pixel-text ripple" onclick="Game.startAdventure()">開始冒險</button>
            <div class="save-controls">
                <button class="small-btn btn-ghost pixel-text ripple" onclick="Game.replayIntro()">🎬 重看開場</button>
                <button class="small-btn btn-secondary pixel-text ripple" onclick="Game.downloadSaveFile()">💾 備份進度</button>
                <button class="small-btn btn-secondary pixel-text ripple" onclick="document.getElementById('save-file-input').click()">📂 讀取進度</button>
                <button class="small-btn btn-danger pixel-text ripple" onclick="Game.resetProgress()">重置進度</button>
            </div>
            <input type="file" id="save-file-input" style="display:none" accept=".json" onchange="Game.handleSaveFileUpload(event)">
        </div>
        
        <!-- Story Screen -->
        <div id="screen-story" class="screen hidden">
            <div class="menu-box card-base">
                <h2 id="story-title" class="pixel-text"></h2>
                <p id="story-text" class="pixel-text story-text"></p>
                <button class="big-btn btn-primary mt-4 ripple" onclick="Game.endStory()">繼續</button>
            </div>
        </div>

        <!-- Map Screen -->
        <div id="screen-map" class="screen hidden">
            <h2 class="pixel-text">選擇區域</h2>
            <div id="map-grid">
                <!-- Dynamically generated regions -->
            </div>
        </div>

        <!-- Region Menu Overlay -->
        <div id="screen-region-menu" class="screen overlay hidden">
            <div class="region-menu-box card-base">
                <h2 id="menu-region-name" class="pixel-text">區域名稱</h2>
                <div id="mixed-chapters" class="hidden mixed-chapters-container">
                    <label class="pixel-text">選擇冠軍之路章節：</label>
                    <select id="mixed-chapter-select" class="chapter-selector">
                        <option value="1">第一章 (第 1-42 字)</option>
                        <option value="2">第二章 (第 43-84 字)</option>
                        <option value="3">第三章 (第 85-125 字)</option>
                    </select>
                </div>
                <button class="big-btn btn-primary ripple" onclick="Game.startStudy()">📖 學習單字</button>
                <button class="big-btn btn-danger ripple" onclick="Game.startBattle()">⚔️ 野外戰鬥</button>
                <button id="btn-gym" class="big-btn btn-gym ripple" onclick="Game.startGym()">🏛️ 挑戰道館</button>
                <button class="small-btn btn-ghost mt-4 ripple" onclick="Game.showScreen('map')">返回</button>
            </div>
        </div>

        <!-- Study Screen -->
        <div id="screen-study" class="screen hidden">
            <div class="study-header">
                <button class="small-btn btn-danger ripple" onclick="Game.showScreen('map')">❌ 離開</button>
                <span id="study-progress-text" class="pixel-text study-progress">進度: 1/1</span>
            </div>
            <div class="study-card card-base">
                <div id="study-emoji" class="emoji-large"></div>
                <h1 id="study-word" class="pixel-text text-primary"></h1>
                <h2 id="study-zh" class="pixel-text text-secondary"></h2>
                <p id="study-sentence"></p>
                <button class="big-btn btn-secondary mt-4 ripple" onclick="Game.studyPlayAudio()">🔊 發音</button>
            </div>
            <div class="study-controls">
                <button class="big-btn btn-ghost ripple" onclick="Game.studyPrev()">◀ 上一個</button>
                <button class="big-btn btn-primary ripple" onclick="Game.studyPlayAudio()">🔊 發音</button>
                <button class="big-btn btn-ghost ripple" onclick="Game.studyNext()">下一個 ▶</button>
            </div>
        </div>

        <!-- Battle & Gym Screen -->
        <div id="screen-battle" class="screen battle-bg hidden">
            <div id="battle-header" class="battle-header">
                <div class="battle-header-top">
                    <span class="pixel-text">怪獸 HP</span>
                    <span id="battle-progress-text" class="pixel-text battle-progress-text">剩餘: 5/5</span>
                </div>
                <!-- Monster Health Bar -->
                <div class="hp-bar-container">
                    <div id="monster-hp-bar" class="hp-bar-fill"></div>
                </div>
                
                <!-- Gym Timer Bar -->
                <div class="gym-timer-label-container">
                    <span id="gym-timer" class="pixel-text hidden gym-timer-text">⏳ 20s</span>
                </div>
                <div id="gym-timer-container" class="timer-bar-container hidden">
                    <div id="gym-timer-bar" class="timer-bar-fill"></div>
                </div>
            </div>
            
            <div id="battle-monster" class="emoji-large">
                <img id="battle-sprite" src="" alt="Monster">
            </div>
            
            <!-- Consumable Item Button -->
            <button id="btn-use-potion" class="small-btn btn-potion hidden pixel-text ripple" onclick="Game.useHintPotion()">🧪 使用提示藥水</button>

            <div id="battle-question-box" class="battle-question card-base">
                <div id="battle-question-content"></div>
            </div>
            
            <!-- Options Grid (Type A, B, D) -->
            <div id="battle-options" class="battle-options-grid"></div>
            
            <!-- Spelling Area (Type C) -->
            <div id="battle-spelling" class="battle-spelling-area hidden">
                <div id="spelling-answer" class="pixel-text spelling-answer-display"></div>
                <div id="spelling-letters" class="spelling-letters-grid"></div>
                <div class="spelling-controls">
                    <button class="small-btn btn-danger ripple" onclick="Game.spellingClear()">重來</button>
                    <button class="small-btn btn-accent ripple" onclick="Game.spellingBackspace()">⌫ 退格</button>
                    <button id="btn-spelling-hint" class="small-btn btn-ghost ripple" onclick="Game.spellingHint()">提示 (5💰)</button>
                </div>
            </div>
        </div>

        <!-- Capture Result Screen -->
        <div id="screen-capture" class="screen overlay hidden">
            <div class="capture-container">
                <h1 id="capture-title" class="capture-title pixel-text text-primary">收服成功！</h1>
                <div class="emoji-large capture-sprite-wrapper">
                    <img id="capture-sprite" class="capture-sprite" src="" alt="Caught Monster">
                </div>
                <h2 id="capture-name" class="capture-name pixel-text">BULBASAUR</h2>
                <p id="capture-rewards" class="capture-rewards"></p>
                <button class="big-btn btn-primary ripple" onclick="Game.closeCapture()">繼續</button>
            </div>
        </div>

        <!-- Pokedex Screen -->
        <div id="screen-pokedex" class="screen pokedex-page hidden">
            <h2 class="pixel-text text-center">寶可夢圖鑑</h2>
            <div id="pokedex-grid" class="pokedex-grid">
                <!-- Dynamically generated -->
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="screen-shop" class="screen shop-page hidden">
            <h2 class="pixel-text text-center">道具商店</h2>
            <div id="shop-gold-display" class="pixel-text text-center shop-gold">💰 0</div>
            <div id="shop-items" class="shop-grid">
                <!-- Dynamically generated -->
            </div>
        </div>
        
        <!-- Dashboard Screen -->
        <div id="screen-dashboard" class="screen dashboard-page hidden">
            <h2 class="pixel-text text-center">學習儀表板</h2>
            <div class="menu-box dashboard-box card-base">
                <h3 class="pixel-text text-center text-primary">熟練度統計</h3>
                <div id="dashboard-stats" class="dashboard-stats-content"></div>
            </div>
        </div>

        <!-- 每日獎勵彈窗 -->
        <div id="screen-daily-reward" class="screen overlay hidden">
            <div class="menu-box daily-reward-box card-base">
                <div class="daily-reward-chest">🎁</div>
                <h2 class="pixel-text reward-title">每日獎勵</h2>
                <p id="daily-reward-streak" class="pixel-text reward-streak">🔥 連續登入 1 天</p>
                <p id="daily-reward-gold" class="pixel-text reward-gold">+10 💰</p>
                <p id="daily-reward-shiny" class="pixel-text reward-shiny hidden">✨ 下場野戰將遇到異色寶可夢！</p>
                <button class="big-btn btn-primary mt-4 ripple" onclick="Game.closeDailyReward()">領取！</button>
            </div>
        </div>

        <!-- 進化動畫 Overlay -->
        <div id="screen-evolution" class="screen overlay hidden">
            <div class="evolution-container">
                <h2 class="evo-title pixel-text">進化中...</h2>
                <div class="evo-sprite-container">
                    <img id="evo-sprite" src="" alt="Evolution">
                </div>
                <p id="evo-text" class="evo-text pixel-text"></p>
                <button id="evo-close-btn" class="big-btn btn-primary mt-4 ripple" onclick="Game.closeEvolution()">太棒了！</button>
            </div>
        </div>

        <!-- 史詩結局動畫 Overlay -->
        <div id="screen-epic-ending" class="screen overlay epic-ending hidden">
            <h1 id="epic-ending-title" class="title-text epic-title">名人堂</h1>
            <div id="epic-badge-grid" class="epic-badge-grid">
                <!-- Badges will be injected here -->
            </div>
            <div id="epic-ending-text" class="epic-ending-text hidden">
                <h2 class="pixel-text">👑 恭喜成為單字大師！</h2>
                <p class="pixel-text">自由挑戰模式已開啟，請點擊畫面繼續冒險</p>
            </div>
        </div>

        <!-- Game Modal (replaces alert/confirm) -->
        <div id="game-modal" class="game-modal hidden">
            <div class="game-modal-box card-base">
                <h3 id="modal-title" class="game-modal-title pixel-text">通知</h3>
                <p id="modal-text" class="game-modal-text"></p>
                <div id="modal-actions" class="game-modal-actions"></div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="game-toast" class="game-toast"></div>

    </div>
    <!-- INJECT_DATA -->
    <!-- INJECT_JS -->
</body>
</html>
