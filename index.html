<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>A1 Movers 單字冒險</title>
    <style>
/* ╔══════════════════════════════════════════════════════════╗
   ║  A1 Movers 單字冒險 — Premium Dark RPG Theme            ║
   ║  Commercial-grade CSS for Pokemon-style vocab game      ║
   ╚══════════════════════════════════════════════════════════╝ */

/* ── 1. CSS VARIABLES ─────────────────────────────────────── */
:root {
  /* Core palette */
  --bg-primary:    #0f172a;
  --bg-secondary:  #1e293b;
  --bg-card:       rgba(30, 41, 59, 0.72);
  --bg-glass:      rgba(15, 23, 42, 0.65);
  --bg-overlay:    rgba(0, 0, 0, 0.6);

  /* Text */
  --text-primary:   #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted:     #64748b;

  /* Accent colors */
  --accent-blue:    #3b82f6;
  --accent-cyan:    #06b6d4;
  --accent-purple:  #a855f7;
  --accent-pink:    #ec4899;
  --accent-green:   #22c55e;
  --accent-orange:  #f97316;
  --accent-red:     #ef4444;
  --accent-amber:   #f59e0b;
  --accent-indigo:  #6366f1;
  --accent-gold:    #eab308;

  /* Gradients */
  --grad-primary:   linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
  --grad-secondary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  --grad-danger:    linear-gradient(135deg, #ef4444 0%, #f97316 100%);
  --grad-success:   linear-gradient(135deg, #22c55e 0%, #06b6d4 100%);
  --grad-accent:    linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
  --grad-gym:       linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%);
  --grad-potion:    linear-gradient(135deg, #ea580c 0%, #f97316 50%, #fb923c 100%);
  --grad-ghost:     linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);

  /* Glass */
  --glass-bg:      rgba(30, 41, 59, 0.55);
  --glass-border:  rgba(148, 163, 184, 0.15);
  --glass-blur:    12px;

  /* Borders & Radius */
  --radius-sm:  8px;
  --radius-md:  14px;
  --radius-lg:  20px;
  --radius-xl:  28px;
  --radius-pill: 100px;

  /* Shadows */
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.25);
  --shadow-md:   0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg:   0 8px 32px rgba(0,0,0,0.45);
  --shadow-glow: 0 0 20px rgba(59,130,246,0.3);

  /* Spacing */
  --sp-xs: 4px;
  --sp-sm: 8px;
  --sp-md: 16px;
  --sp-lg: 24px;
  --sp-xl: 32px;
  --sp-2xl: 48px;

  /* Transitions */
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);

  /* Font */
  --font-pixel: 'Press Start 2P', 'Courier New', monospace;
  --font-ui:    'Inter', 'Noto Sans TC', 'Segoe UI', sans-serif;

  /* Z-index layers */
  --z-base:    1;
  --z-card:    10;
  --z-topbar:  100;
  --z-overlay: 500;
  --z-modal:   600;
  --z-toast:   700;
}


/* ── 2. RESET & GLOBAL ────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--font-ui);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

img { max-width: 100%; display: block; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* Themed scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 4px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }


/* ── 3. GAME CONTAINER ────────────────────────────────────── */
#game-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--sp-md);
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(168,85,247,0.08) 0%, transparent 60%),
    var(--bg-primary);
}


/* ── 4. UTILITY CLASSES ───────────────────────────────────── */
.hidden       { display: none !important; }
.text-center  { text-align: center; }
.text-success { color: var(--accent-green); }
.text-primary { color: var(--accent-blue); }
.text-secondary { color: var(--text-secondary); }
.mt-4         { margin-top: var(--sp-lg); }


/* ── 5. TYPOGRAPHY ────────────────────────────────────────── */
.pixel-text {
  font-family: var(--font-pixel);
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(59,130,246,0.5);
}

.title-text {
  font-family: var(--font-pixel);
  font-size: 1.1rem;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(59,130,246,0.4));
}

.emoji-large {
  font-size: 3.5rem;
  display: block;
  text-align: center;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  animation: popIn 0.5s var(--ease-bounce);
}

.word-text {
  font-size: 2rem;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: 1px;
}

.zh-text {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-top: var(--sp-xs);
}


/* ── 6. SCREEN SYSTEM ─────────────────────────────────────── */
.screen {
  display: flex;
  flex-direction: column;
  padding: var(--sp-md);
  padding-top: 60px; /* room for top-bar */
  padding-bottom: var(--sp-xl);
  min-height: 100vh;
  animation: fadeIn 0.35s var(--ease-smooth);
}

.screen.active {
  display: flex;
}

.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: var(--z-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s var(--ease-smooth);
}


/* ── 7. TOP BAR & NAVIGATION ──────────────────────────────── */
#top-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: var(--z-topbar);
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--glass-border);
  padding: var(--sp-sm) var(--sp-md);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stats {
  display: flex;
  gap: var(--sp-md);
  font-size: 0.85rem;
  font-weight: 600;
}

.stats span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-buttons {
  display: flex;
  gap: var(--sp-sm);
}

.nav-btn {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 1.15rem;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s var(--ease-smooth);
  position: relative;
  overflow: hidden;
}

.nav-btn:hover {
  background: rgba(59,130,246,0.2);
  border-color: var(--accent-blue);
  transform: translateY(-1px);
}

.nav-btn:active {
  transform: translateY(0) scale(0.95);
}


/* ── 8. BUTTONS — CORE SYSTEM ─────────────────────────────── */
/* Base shared styles */
.big-btn, .small-btn, .option-btn,
.btn-primary, .btn-secondary, .btn-ghost, .btn-accent,
.btn-danger, .btn-gray, .btn-gym, .btn-potion, .skip-btn {
  border: none;
  border-radius: var(--radius-pill);
  font-weight: 700;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s var(--ease-smooth);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-sm);
  text-decoration: none;
  cursor: pointer;
}

/* Shimmer overlay for gradient buttons */
.big-btn::before, .btn-primary::before, .btn-secondary::before,
.btn-accent::before, .btn-danger::before, .btn-gym::before, .btn-potion::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,255,255,0.15) 45%,
    rgba(255,255,255,0.25) 50%,
    rgba(255,255,255,0.15) 55%,
    transparent 70%
  );
  transform: translateX(-120%);
  transition: transform 0.6s var(--ease-smooth);
}

.big-btn:hover::before, .btn-primary:hover::before,
.btn-secondary:hover::before, .btn-accent:hover::before,
.btn-danger:hover::before, .btn-gym:hover::before, .btn-potion:hover::before {
  transform: translateX(120%);
}

/* Big button */
.big-btn {
  width: 100%;
  padding: 16px 28px;
  font-size: 1.05rem;
  background: var(--grad-primary);
  color: #fff;
  box-shadow: 0 4px 20px rgba(59,130,246,0.35);
}

.big-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(59,130,246,0.5);
}

.big-btn:active {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 2px 12px rgba(59,130,246,0.3);
}

/* Small button */
.small-btn {
  padding: 10px 22px;
  font-size: 0.85rem;
  background: var(--grad-primary);
  color: #fff;
  box-shadow: var(--shadow-sm);
}

.small-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

/* Option button (quiz choices) */
.option-btn {
  width: 100%;
  padding: 14px 20px;
  font-size: 1rem;
  background: var(--glass-bg);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  text-align: left;
  box-shadow: var(--shadow-sm);
}

.option-btn:hover {
  background: rgba(59,130,246,0.12);
  border-color: var(--accent-blue);
  transform: translateX(4px);
  box-shadow: var(--shadow-md);
}

.option-btn:active {
  transform: translateX(2px) scale(0.98);
}

.option-btn.correct {
  background: rgba(34,197,94,0.2);
  border-color: var(--accent-green);
  box-shadow: 0 0 16px rgba(34,197,94,0.3);
}

.option-btn.wrong {
  background: rgba(239,68,68,0.2);
  border-color: var(--accent-red);
  animation: wrongShake 0.5s var(--ease-smooth);
}

/* Variant buttons */
.btn-primary {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--grad-primary);
  color: #fff;
  box-shadow: 0 4px 16px rgba(59,130,246,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(59,130,246,0.45);
}

.btn-secondary {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--grad-secondary);
  color: #fff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.3);
}

.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(99,102,241,0.45);
}

.btn-ghost {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--grad-ghost);
  border: 1.5px solid var(--glass-border);
  color: var(--text-primary);
}

.btn-ghost:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--text-secondary);
  transform: translateY(-1px);
}

.btn-accent {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--grad-accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(245,158,11,0.3);
}

.btn-accent:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(245,158,11,0.45);
}

.btn-danger {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--grad-danger);
  color: #fff;
  box-shadow: 0 4px 16px rgba(239,68,68,0.3);
}

.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(239,68,68,0.45);
}

.btn-gray {
  padding: 12px 28px;
  font-size: 0.95rem;
  background: var(--bg-secondary);
  border: 1.5px solid var(--glass-border);
  color: var(--text-secondary);
}

.btn-gray:hover {
  background: rgba(100,116,139,0.25);
  color: var(--text-primary);
  transform: translateY(-1px);
}

.btn-gym {
  padding: 14px 28px;
  font-size: 1rem;
  background: var(--grad-gym);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}

.btn-gym:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(124,58,237,0.55);
}

.btn-potion {
  padding: 12px 24px;
  font-size: 0.95rem;
  background: var(--grad-potion);
  color: #fff;
  box-shadow: 0 4px 16px rgba(234,88,12,0.35);
}

.btn-potion:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(234,88,12,0.5);
}

/* Skip button */
.skip-btn {
  padding: 8px 20px;
  font-size: 0.8rem;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-secondary);
  border-radius: var(--radius-pill);
}

.skip-btn:hover {
  background: rgba(255,255,255,0.15);
  color: var(--text-primary);
}


/* ── 9. RIPPLE EFFECT ─────────────────────────────────────── */
.ripple {
  position: relative;
  overflow: hidden;
}

.ripple-circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: rippleExpand 0.6s linear forwards;
  pointer-events: none;
}


/* ── 10. CARDS — BASE SYSTEM ──────────────────────────────── */
.card-base {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  box-shadow: var(--shadow-md);
  transition: all 0.3s var(--ease-smooth);
}

.card-base:hover {
  border-color: rgba(148,163,184,0.25);
  box-shadow: var(--shadow-lg);
}

.menu-box {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  box-shadow: var(--shadow-md);
  animation: popIn 0.4s var(--ease-bounce);
}

.region-menu-box {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  box-shadow: var(--shadow-md);
  animation: slideInUp 0.4s var(--ease-spring);
}

/* Study card */
.study-card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: var(--sp-2xl) var(--sp-lg);
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.5s var(--ease-bounce);
}

.study-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-md);
}

.study-progress {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 600;
}

.study-controls {
  display: flex;
  gap: var(--sp-sm);
  margin-top: var(--sp-lg);
  flex-wrap: wrap;
  justify-content: center;
}

.sentence-box {
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--radius-md);
  padding: var(--sp-md);
  margin-top: var(--sp-md);
  font-style: italic;
  color: var(--text-secondary);
  font-size: 0.95rem;
  line-height: 1.7;
}

.chapter-selector {
  display: flex;
  gap: var(--sp-sm);
  flex-wrap: wrap;
  justify-content: center;
  margin-top: var(--sp-md);
}

.save-controls {
  display: flex;
  gap: var(--sp-sm);
  justify-content: center;
  margin-top: var(--sp-md);
}


/* ── 11. TITLE SCREEN ─────────────────────────────────────── */
#screen-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding-top: 0;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.1) 0%, transparent 60%),
    var(--bg-primary);
  text-align: center;
  gap: var(--sp-lg);
}

.screen-title-logo {
  font-family: var(--font-pixel);
  font-size: 1.6rem;
  letter-spacing: 3px;
  background: linear-gradient(135deg, #60a5fa, #818cf8, #c084fc, #f472b6, #60a5fa);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientBG 4s ease infinite;
  filter: drop-shadow(0 0 20px rgba(99,102,241,0.5));
  padding: var(--sp-md) 0;
}


/* ── 12. INTRO CINEMATIC ──────────────────────────────────── */
#screen-intro-cinematic {
  padding-top: 0;
}

.cinematic-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 40px;
  min-height: 100vh;
  background-color: #000;
  background-size: contain !important;
  background-position: center top !important;
  background-repeat: no-repeat !important;
  position: relative;
  overflow: hidden;
}

.cinematic-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at center, rgba(59,130,246,0.1), transparent 70%);
  pointer-events: none;
}

.cinematic-text-container {
  background: rgba(0, 0, 0, 0.6);
  padding: var(--sp-lg);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  max-width: 80%;
  margin-bottom: var(--sp-xl);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.cinematic-text {
  font-family: var(--font-pixel);
  font-size: 1.3rem;
  color: var(--text-primary);
  text-align: center;
  line-height: 2.2;
  max-width: 800px;
  animation: fadeIn 1s var(--ease-smooth);
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}


/* ── 13. MAP SCREEN ───────────────────────────────────────── */
#screen-map {
  gap: var(--sp-md);
}

#map-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--sp-md);
  padding: var(--sp-sm) 0;
}

/* Map node base */
.map-node {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 2px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg) var(--sp-md);
  text-align: center;
  cursor: pointer;
  transition: all 0.35s var(--ease-smooth);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-sm);
}

.map-node::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.35s var(--ease-smooth);
  pointer-events: none;
}

/* Region color accents */
.map-node[data-region='animals']            { --region-color: #22c55e; }
.map-node[data-region='food']               { --region-color: #f97316; }
.map-node[data-region='body']               { --region-color: #ec4899; }
.map-node[data-region='school']             { --region-color: #3b82f6; }
.map-node[data-region='sports']             { --region-color: #ef4444; }
.map-node[data-region='home_family']        { --region-color: #f59e0b; }
.map-node[data-region='weather_world']      { --region-color: #06b6d4; }
.map-node[data-region='places_transport']   { --region-color: #6366f1; }
.map-node[data-region='time_numbers']       { --region-color: #a855f7; }
.map-node[data-region='mixed']              { --region-color: #eab308; }

.map-node::before {
  background: radial-gradient(circle at 50% 30%, var(--region-color, var(--accent-blue)), transparent 70%);
}

/* Unlocked */
.map-node.unlocked {
  border-color: var(--region-color, var(--accent-blue));
  box-shadow: 0 0 16px rgba(var(--region-color, 59,130,246), 0.2);
}

.map-node.unlocked::before {
  opacity: 0.12;
}

.map-node.unlocked:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 8px 28px rgba(0,0,0,0.3), 0 0 20px rgba(var(--region-color, 59,130,246), 0.25);
}

.map-node.unlocked:hover::before {
  opacity: 0.2;
}

/* Locked */
.map-node.locked {
  filter: grayscale(0.7) brightness(0.5);
  cursor: not-allowed;
  opacity: 0.6;
}

.map-node.locked:hover {
  animation: lockShake 0.4s var(--ease-smooth);
}

/* Map node inner elements */
.map-node .map-icon {
  font-size: 2.2rem;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

.map-node .map-progress {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid var(--glass-border);
  border-top-color: var(--region-color, var(--accent-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-secondary);
}

.map-node .map-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 1rem;
  filter: drop-shadow(0 0 6px rgba(234,179,8,0.5));
  animation: pulseGlow 2s ease-in-out infinite;
}

/* Staggered entrance for map nodes */
#map-grid .map-node:nth-child(1)  { animation: popIn 0.4s var(--ease-bounce) 0.05s both; }
#map-grid .map-node:nth-child(2)  { animation: popIn 0.4s var(--ease-bounce) 0.1s both; }
#map-grid .map-node:nth-child(3)  { animation: popIn 0.4s var(--ease-bounce) 0.15s both; }
#map-grid .map-node:nth-child(4)  { animation: popIn 0.4s var(--ease-bounce) 0.2s both; }
#map-grid .map-node:nth-child(5)  { animation: popIn 0.4s var(--ease-bounce) 0.25s both; }
#map-grid .map-node:nth-child(6)  { animation: popIn 0.4s var(--ease-bounce) 0.3s both; }
#map-grid .map-node:nth-child(7)  { animation: popIn 0.4s var(--ease-bounce) 0.35s both; }
#map-grid .map-node:nth-child(8)  { animation: popIn 0.4s var(--ease-bounce) 0.4s both; }
#map-grid .map-node:nth-child(9)  { animation: popIn 0.4s var(--ease-bounce) 0.45s both; }
#map-grid .map-node:nth-child(10) { animation: popIn 0.4s var(--ease-bounce) 0.5s both; }


/* ── 14. BATTLE SCREEN ────────────────────────────────────── */
#screen-battle {
  padding-top: 60px;
  gap: var(--sp-md);
}

.battle-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 20%, rgba(239,68,68,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.06) 0%, transparent 50%),
    var(--bg-primary);
  pointer-events: none;
  z-index: 0;
}

.battle-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-md);
  position: relative;
  z-index: var(--z-base);
}

#battle-sprite {
  font-size: 4rem;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  animation: popIn 0.5s var(--ease-bounce);
  text-align: center;
}

/* HP Bar */
.hp-bar-container {
  width: 100%;
  height: 14px;
  background: rgba(0,0,0,0.4);
  border-radius: var(--radius-pill);
  overflow: hidden;
  border: 1px solid var(--glass-border);
  position: relative;
}

.hp-bar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  background: linear-gradient(90deg, var(--accent-red), var(--accent-amber), var(--accent-green));
  background-size: 300% 100%;
  transition: width 0.6s var(--ease-smooth);
  position: relative;
  box-shadow: 0 0 8px rgba(34,197,94,0.3);
}

/* HP color changes based on width via JS-set background-position */
.hp-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  border-radius: inherit;
}

/* Timer bar (gym) */
.timer-bar-container {
  width: 100%;
  height: 10px;
  background: rgba(0,0,0,0.4);
  border-radius: var(--radius-pill);
  overflow: hidden;
  border: 1px solid var(--glass-border);
}

.timer-bar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  background: var(--grad-gym);
  transition: width 0.3s linear;
  box-shadow: 0 0 8px rgba(124,58,237,0.4);
}

.battle-question {
  text-align: center;
  position: relative;
  z-index: var(--z-base);
}

.battle-options-grid {
  display: flex;
  flex-direction: column;
  gap: var(--sp-sm);
  position: relative;
  z-index: var(--z-base);
}

/* Staggered option entrance */
.battle-options-grid .option-btn:nth-child(1) { animation: slideInLeft 0.3s var(--ease-spring) 0.05s both; }
.battle-options-grid .option-btn:nth-child(2) { animation: slideInRight 0.3s var(--ease-spring) 0.1s both; }
.battle-options-grid .option-btn:nth-child(3) { animation: slideInLeft 0.3s var(--ease-spring) 0.15s both; }
.battle-options-grid .option-btn:nth-child(4) { animation: slideInRight 0.3s var(--ease-spring) 0.2s both; }

.battle-spelling-area {
  position: relative;
  z-index: var(--z-base);
}

.feedback-msg {
  text-align: center;
  font-weight: 700;
  font-size: 1.1rem;
  padding: var(--sp-sm);
  border-radius: var(--radius-md);
  animation: popIn 0.4s var(--ease-bounce);
  color: var(--accent-green);
}

.feedback-miss {
  color: var(--accent-red);
}


/* ── 15. SPELLING QUIZ (WORDLE-STYLE) ─────────────────────── */
.spelling-answer-display {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: var(--sp-md) 0;
  flex-wrap: wrap;
}

.spelling-tile {
  width: 44px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  font-weight: 800;
  text-transform: uppercase;
  background: var(--bg-secondary);
  border: 2px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  transition: all 0.25s var(--ease-bounce);
  animation: popIn 0.3s var(--ease-bounce) backwards;
}

.spelling-tile.filled {
  border-color: var(--accent-blue);
  background: rgba(59,130,246,0.15);
  animation: letterFlip 0.35s var(--ease-bounce);
}

.spelling-tile.correct {
  border-color: var(--accent-green);
  background: rgba(34,197,94,0.2);
  box-shadow: 0 0 10px rgba(34,197,94,0.3);
}

.spelling-tile.wrong {
  border-color: var(--accent-red);
  background: rgba(239,68,68,0.15);
  animation: wrongShake 0.5s var(--ease-smooth);
}

.spelling-letters-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-top: var(--sp-md);
}

.spelling-letters-grid button {
  min-width: 38px;
  height: 42px;
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: var(--glass-bg);
  color: var(--text-primary);
  font-size: 1.1rem;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s var(--ease-smooth);
}

.spelling-letters-grid button:hover {
  background: rgba(59,130,246,0.2);
  border-color: var(--accent-blue);
  transform: translateY(-2px);
}

.spelling-tile.used,
.spelling-letters-grid button.used {
  opacity: 0.35;
  pointer-events: none;
  transform: scale(0.9);
}

.spelling-controls {
  display: flex;
  gap: var(--sp-sm);
  justify-content: center;
  margin-top: var(--sp-md);
}


/* ── 16. CAPTURE CELEBRATION ──────────────────────────────── */
.capture-container {
  text-align: center;
  padding: var(--sp-2xl) var(--sp-md);
  animation: popIn 0.6s var(--ease-bounce);
}

.capture-title {
  font-family: var(--font-pixel);
  font-size: 1rem;
  margin-bottom: var(--sp-lg);
  background: linear-gradient(90deg, var(--accent-amber), var(--accent-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.capture-sprite {
  font-size: 5rem;
  margin: var(--sp-lg) 0;
  filter: drop-shadow(0 0 20px rgba(234,179,8,0.5));
  animation: bounceIn 0.8s var(--ease-bounce);
}

.capture-name {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: var(--sp-md);
}

.capture-celebration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: var(--z-overlay);
  overflow: hidden;
}

.capture-celebration::before,
.capture-celebration::after {
  content: '⭐🌟✨💫⭐🌟✨💫';
  position: absolute;
  font-size: 1.5rem;
  animation: starBurst 2s ease-out forwards;
  white-space: nowrap;
}

.capture-celebration::before {
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.capture-celebration::after {
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: 0.2s;
}


/* ── 17. POKEDEX ──────────────────────────────────────────── */
#screen-pokedex {
  gap: var(--sp-md);
}

.pokedex-page {
  display: flex;
  flex-direction: column;
  gap: var(--sp-md);
}

.pokedex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap: var(--sp-sm);
}

.dex-entry {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: var(--sp-md) var(--sp-sm);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease-smooth);
  filter: grayscale(1) brightness(0.4);
  opacity: 0.5;
}

.dex-entry .dex-sprite {
  font-size: 2rem;
  margin-bottom: var(--sp-xs);
}

.dex-entry .dex-name {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 600;
}

.dex-entry.caught {
  filter: none;
  opacity: 1;
  animation: popIn 0.4s var(--ease-bounce) backwards;
}

.dex-entry.caught:hover {
  transform: translateY(-4px) scale(1.05);
  border-color: var(--accent-blue);
  box-shadow: var(--shadow-lg), 0 0 16px rgba(59,130,246,0.2);
}

/* Pokemon Card with 3D tilt */
.card-pokemon {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 2px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  text-align: center;
  cursor: pointer;
  transition: all 0.4s var(--ease-smooth);
  perspective: 800px;
  transform-style: preserve-3d;
}

.card-pokemon:hover {
  transform: rotateX(5deg) rotateY(-5deg) translateY(-6px);
  box-shadow:
    var(--shadow-lg),
    8px 8px 24px rgba(0,0,0,0.3),
    0 0 20px rgba(59,130,246,0.15);
  border-color: var(--accent-blue);
}

/* Rarity borders */
.card-pokemon.rarity-silver {
  border-image: linear-gradient(135deg, #9ca3af, #d1d5db, #9ca3af) 1;
}

.card-pokemon.rarity-gold {
  border-image: linear-gradient(135deg, #d97706, #fbbf24, #d97706) 1;
  box-shadow: var(--shadow-md), 0 0 16px rgba(217,119,6,0.3);
}

.card-pokemon.rarity-rainbow {
  border-image: linear-gradient(135deg, #ef4444, #f97316, #eab308, #22c55e, #3b82f6, #a855f7) 1;
  box-shadow: var(--shadow-md), 0 0 20px rgba(168,85,247,0.3);
}

/* Staggered pokedex grid entrance */
.pokedex-grid .dex-entry:nth-child(1)  { animation-delay: 0.03s; }
.pokedex-grid .dex-entry:nth-child(2)  { animation-delay: 0.06s; }
.pokedex-grid .dex-entry:nth-child(3)  { animation-delay: 0.09s; }
.pokedex-grid .dex-entry:nth-child(4)  { animation-delay: 0.12s; }
.pokedex-grid .dex-entry:nth-child(5)  { animation-delay: 0.15s; }
.pokedex-grid .dex-entry:nth-child(6)  { animation-delay: 0.18s; }
.pokedex-grid .dex-entry:nth-child(7)  { animation-delay: 0.21s; }
.pokedex-grid .dex-entry:nth-child(8)  { animation-delay: 0.24s; }
.pokedex-grid .dex-entry:nth-child(9)  { animation-delay: 0.27s; }


/* ── 18. SHOP ─────────────────────────────────────────────── */
#screen-shop {
  gap: var(--sp-md);
}

.shop-page {
  display: flex;
  flex-direction: column;
  gap: var(--sp-lg);
}

.shop-gold {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent-amber);
  text-shadow: 0 0 10px rgba(245,158,11,0.3);
}

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--sp-md);
}

.card-shop {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg) var(--sp-md);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease-smooth);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-sm);
}

.card-shop:hover {
  transform: translateY(-4px);
  border-color: var(--accent-amber);
  box-shadow: var(--shadow-lg), 0 0 16px rgba(245,158,11,0.2);
}

.card-shop .shop-item-icon {
  font-size: 2.5rem;
}

.card-shop .shop-item-name {
  font-weight: 700;
  font-size: 0.9rem;
}

.card-shop .shop-item-price {
  color: var(--accent-amber);
  font-weight: 600;
  font-size: 0.85rem;
}


/* ── 19. DASHBOARD ────────────────────────────────────────── */
#screen-dashboard {
  gap: var(--sp-md);
}

.dashboard-page {
  display: flex;
  flex-direction: column;
  gap: var(--sp-lg);
}

.dashboard-box {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  box-shadow: var(--shadow-sm);
}

.dashboard-box h3 {
  font-size: 1rem;
  margin-bottom: var(--sp-md);
  color: var(--text-primary);
}

/* Progress bars */
.progress-bar-container {
  width: 100%;
  height: 12px;
  background: rgba(0,0,0,0.35);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin: var(--sp-sm) 0;
}

.progress-bar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  background: var(--grad-primary);
  transition: width 0.8s var(--ease-smooth);
  position: relative;
  animation: progressFill 1s var(--ease-smooth) backwards;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.2),
    transparent
  );
  animation: shimmer 2s infinite;
}


/* ── 20. DAILY REWARD ─────────────────────────────────────── */
#screen-daily-reward {
  gap: var(--sp-lg);
}

.daily-reward-box {
  text-align: center;
  padding: var(--sp-2xl) var(--sp-md);
}

.daily-reward-chest {
  font-size: 5rem;
  display: inline-block;
  animation: chestOpen 1.5s var(--ease-bounce) forwards;
  filter: drop-shadow(0 0 20px rgba(245,158,11,0.5));
  cursor: pointer;
}

.coin-shower {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: var(--z-overlay);
  overflow: hidden;
}

.coin-shower::before {
  content: '🪙🪙🪙🪙🪙🪙🪙🪙🪙🪙';
  position: absolute;
  top: -10%;
  left: 0;
  right: 0;
  font-size: 1.8rem;
  text-align: center;
  letter-spacing: 10px;
  animation: coinDrop 2s ease-in forwards;
}


/* ── 21. EVOLUTION ────────────────────────────────────────── */
#screen-evolution {
  gap: var(--sp-lg);
}

.evolution-container {
  text-align: center;
  padding: var(--sp-2xl) var(--sp-md);
}

.evo-title {
  font-family: var(--font-pixel);
  font-size: 0.9rem;
  color: var(--accent-purple);
  text-shadow: 0 0 12px rgba(168,85,247,0.5);
  margin-bottom: var(--sp-lg);
}

.evo-sprite-container {
  margin: var(--sp-xl) 0;
}

#evo-sprite {
  font-size: 5rem;
  display: inline-block;
  animation: evolutionPulse 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 24px rgba(168,85,247,0.5));
}

.evo-text {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: var(--sp-md);
}


/* ── 22. EPIC ENDING ──────────────────────────────────────── */
.epic-ending {
  text-align: center;
  padding: var(--sp-2xl) var(--sp-md);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--sp-lg);
  background:
    radial-gradient(ellipse at 50% 30%, rgba(234,179,8,0.1) 0%, transparent 60%),
    var(--bg-primary);
}

.epic-title {
  font-family: var(--font-pixel);
  font-size: 1.2rem;
  background: linear-gradient(135deg, #fbbf24, #f97316, #ef4444, #ec4899, #a855f7);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientBG 3s ease infinite;
}

.epic-badge-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--sp-md);
  margin: var(--sp-lg) 0;
}

.epic-badge {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--glass-bg);
  border: 2px solid var(--accent-amber);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  box-shadow: 0 0 12px rgba(234,179,8,0.3);
  animation: bounceIn 0.5s var(--ease-bounce) backwards;
}

.epic-ending-text {
  font-size: 1rem;
  color: var(--text-secondary);
  line-height: 1.8;
  max-width: 340px;
}


/* ── 23. MODAL SYSTEM ─────────────────────────────────────── */
.game-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: var(--z-modal);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-lg);
  animation: fadeIn 0.25s var(--ease-smooth);
}

.game-modal-box {
  background: var(--bg-secondary);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: var(--sp-2xl) var(--sp-lg);
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.4s var(--ease-bounce);
}

.game-modal-title {
  font-family: var(--font-pixel);
  font-size: 0.85rem;
  color: var(--text-primary);
  margin-bottom: var(--sp-md);
}

.game-modal-text {
  font-size: 0.95rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: var(--sp-lg);
}

.game-modal-actions {
  display: flex;
  gap: var(--sp-sm);
  justify-content: center;
  flex-wrap: wrap;
}


/* ── 24. TOAST NOTIFICATIONS ──────────────────────────────── */
.game-toast {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 420px;
  width: calc(100% - 32px);
  background: var(--bg-secondary);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: var(--sp-md) var(--sp-lg);
  box-shadow: var(--shadow-lg);
  z-index: var(--z-toast);
  font-weight: 600;
  font-size: 0.9rem;
  text-align: center;
  transition: top 0.5s var(--ease-spring);
}

.game-toast.show {
  top: var(--sp-lg);
}

.game-toast.toast-success {
  border-left: 4px solid var(--accent-green);
}

.game-toast.toast-error {
  border-left: 4px solid var(--accent-red);
}

.game-toast.toast-info {
  border-left: 4px solid var(--accent-blue);
}


/* ── 25. LOADING SHIMMER ──────────────────────────────────── */
.shimmer-loading {
  background: linear-gradient(
    110deg,
    var(--bg-secondary) 30%,
    rgba(148,163,184,0.1) 50%,
    var(--bg-secondary) 70%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s linear infinite;
  border-radius: var(--radius-md);
}


/* ── 26. FEEDBACK ANIMATIONS ──────────────────────────────── */
.correct-flash {
  animation: correctFlash 0.5s var(--ease-smooth);
}

.shake {
  animation: shake 0.5s var(--ease-smooth);
}


/* ── 27. KEYFRAME ANIMATIONS ─────────────────────────────── */
/* Fade */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* Slide */
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-40px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Pop & Bounce */
@keyframes popIn {
  0%   { opacity: 0; transform: scale(0.7); }
  70%  { transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes bounceIn {
  0%   { opacity: 0; transform: scale(0.3); }
  50%  { opacity: 1; transform: scale(1.1); }
  70%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}

/* Shakes */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%  { transform: translateX(-8px); }
  40%  { transform: translateX(8px); }
  60%  { transform: translateX(-6px); }
  80%  { transform: translateX(6px); }
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-10px) rotate(-1deg); }
  30% { transform: translateX(10px) rotate(1deg); }
  45% { transform: translateX(-8px); }
  60% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
  90% { transform: translateX(4px); }
}

@keyframes lockShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
}

/* Flash */
@keyframes correctFlash {
  0%   { background-color: transparent; }
  30%  { background-color: rgba(34,197,94,0.25); }
  100% { background-color: transparent; }
}

/* Evolution */
@keyframes evolutionPulse {
  0%   { transform: scale(1); filter: drop-shadow(0 0 20px rgba(168,85,247,0.4)); }
  50%  { transform: scale(1.15); filter: drop-shadow(0 0 40px rgba(168,85,247,0.7)) brightness(1.3); }
  100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(168,85,247,0.4)); }
}

/* Gradient background shift */
@keyframes gradientBG {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Shimmer loading */
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Coin drop */
@keyframes coinDrop {
  0%   { transform: translateY(-100%); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(120vh); opacity: 0; }
}

/* Star burst for captures */
@keyframes starBurst {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; letter-spacing: 0; }
  60%  { opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(3); opacity: 0; letter-spacing: 30px; }
}

/* Chest open */
@keyframes chestOpen {
  0%   { transform: scale(0.6) rotate(-10deg); opacity: 0; }
  40%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
  60%  { transform: scale(0.95) rotate(-3deg); }
  80%  { transform: scale(1.05) rotate(1deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Ripple */
@keyframes rippleExpand {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* 3D tilt hover — used via JS but CSS fallback */
@keyframes tiltHover {
  0%   { transform: rotateX(0) rotateY(0); }
  25%  { transform: rotateX(3deg) rotateY(-3deg); }
  50%  { transform: rotateX(-3deg) rotateY(3deg); }
  75%  { transform: rotateX(2deg) rotateY(-2deg); }
  100% { transform: rotateX(0) rotateY(0); }
}

/* Progress fill */
@keyframes progressFill {
  from { width: 0; }
}

/* Menu pop */
@keyframes menuPop {
  0%   { opacity: 0; transform: scale(0.85) translateY(10px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* Letter flip for spelling */
@keyframes letterFlip {
  0%   { transform: rotateX(90deg) scale(0.8); }
  60%  { transform: rotateX(-10deg) scale(1.05); }
  100% { transform: rotateX(0deg) scale(1); }
}

/* Pulse glow (for badges/stars) */
@keyframes pulseGlow {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(234,179,8,0.4)); }
  50%      { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(234,179,8,0.7)); }
}


/* ── 28. REDUCED MOTION ───────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* ── 29. RESPONSIVE — TABLET (≤768px) ─────────────────────── */
@media (max-width: 768px) {
  #game-container {
    max-width: 100%;
  }

  .pokedex-grid {
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 8px;
  }

  .shop-grid {
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  }
}

/* ── 30. RESPONSIVE — MOBILE (≤480px) ─────────────────────── */
@media (max-width: 480px) {
  html {
    font-size: 14px;
  }

  .screen {
    padding: var(--sp-sm);
    padding-top: 56px;
  }

  #top-bar {
    padding: 6px var(--sp-sm);
  }

  .stats {
    font-size: 0.75rem;
    gap: var(--sp-sm);
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    font-size: 1rem;
  }

  .big-btn {
    padding: 14px 20px;
    font-size: 0.95rem;
  }

  .spelling-tile {
    width: 36px;
    height: 44px;
    font-size: 1.1rem;
  }

  .spelling-letters-grid button {
    min-width: 32px;
    height: 36px;
    font-size: 0.95rem;
  }

  #map-grid {
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
  }

  .map-node {
    padding: var(--sp-md) var(--sp-sm);
  }

  .map-node .map-icon {
    font-size: 1.8rem;
  }

  .emoji-large {
    font-size: 2.8rem;
  }

  #battle-sprite {
    font-size: 3rem;
  }

  .word-text {
    font-size: 1.5rem;
  }

  .screen-title-logo {
    font-size: 1.2rem;
  }

  .cinematic-text {
    font-size: 0.85rem;
    line-height: 1.8;
  }
  
  .cinematic-text-container {
    padding: var(--sp-sm);
    max-width: 95%;
  }

  .pokedex-grid {
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
  }

  .dex-entry {
    padding: var(--sp-sm) var(--sp-xs);
  }

  .dex-entry .dex-sprite {
    font-size: 1.5rem;
  }

  .dex-entry .dex-name {
    font-size: 0.6rem;
  }

  .game-modal-box {
    padding: var(--sp-xl) var(--sp-md);
    border-radius: var(--radius-lg);
  }

  .shop-grid {
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
  }

  .card-shop {
    padding: var(--sp-md) var(--sp-sm);
  }

  .epic-badge {
    width: 48px;
    height: 48px;
    font-size: 1.2rem;
  }
}

/* ── END ──────────────────────────────────────────────────── */

            document.getElementById('modal-text').innerHTML = text;
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = '';
            const btn = document.createElement('button');
            btn.className = 'big-btn btn-primary ripple';
            btn.innerText = actionLabel;

                modal.classList.add('hidden');

            actions.appendChild(btn);
            modal.classList.remove('hidden');

        showConfirm(title, text, confirmLabel, cancelLabel, onConfirm) {
            const modal = document.getElementById('game-modal');
            if(!modal) {
                if(confirm(text)) onConfirm();
                return;

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const actions = document.getElementById('modal-actions');

    init() {
        try {
            this.loadState();
            this.migrateState();
            this.applyEquipment();

            if (typeof twemoji !== 'undefined') {
                twemoji.parse(document.body);

            console.error(e);
            alert("遊戲載入發生錯誤: " + e.message);
        }

    loadState() {
        const saved = localStorage.getItem('A1MoversState');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                this.state = Object.assign({}, this.state, parsed);
                if (!Array.isArray(this.state.unlockedRegions)) this.state.unlockedRegions = ['animals'];
                if (!Array.isArray(this.state.badges)) this.state.badges = [];
                if (!Array.isArray(this.state.items)) this.state.items = [];
                if (!Array.isArray(this.state.storySeen)) this.state.storySeen = [];
                if (!this.state.consumables) this.state.consumables = { potion_hint: 0 };
                if (!Array.isArray(this.state.shinyCaught)) this.state.shinyCaught = [];
                if (typeof this.state.streak !== 'number') this.state.streak = 0;
            } catch (e) {
                console.error("存檔損壞，備份後重置。");
                localStorage.setItem('A1MoversState_backup', saved);
                // 重置 state 回預設值（已由宣告時初始化）
            }
        }
    },

    // 存檔遷移：補齊舊版存檔缺少的欄位
    migrateState() {
        // 遷移 wordStats：補齊 box/lastSeen/correctDays，移除舊的 nextReview
        Object.keys(this.state.wordStats).forEach(id => {
            const s = this.state.wordStats[id];
            if (typeof s.box !== 'number') s.box = 1;
            if (s.box > 3) s.box = 3; // 從舊版 max=5 降回 max=3
            if (!s.lastSeen) s.lastSeen = "";
            if (!Array.isArray(s.correctDays)) s.correctDays = [];
            delete s.nextReview; // 移除舊的時間戳欄位
        });
        // 遷移 caught：從 wordId 單字綁定轉為 words 多字綁定
        this.state.caught.forEach(c => {
            if (!Array.isArray(c.words)) {
                c.words = c.wordId ? [c.wordId] : [];
                delete c.wordId;
            }
            if (typeof c.evolvedStage !== 'number') c.evolvedStage = 0;
        });
        // 遷移 lastLogin：從舊的 timestamp 轉為日期字串
        if (typeof this.state.lastLogin === 'number' && this.state.lastLogin > 0) {
            const d = new Date(this.state.lastLogin);
            this.state.lastLogin = d.toISOString().slice(0, 10);
        }
        if (this.state.saveVersion < 6) {
            this.state.dailyQuests = this.state.dailyQuests || null;
            this.state.saveVersion = 6;
        }
        this.saveState();
    },

    saveState() {
        this.state.saveVersion = 6;
        localStorage.setItem('A1MoversState', JSON.stringify(this.state));
        this.updateTopBar();
    },

    resetProgress() {
        this.ui.showConfirm('重置進度', '確定要重置所有進度嗎？這將會清除所有已解鎖的徽章與收集到的寶可夢，且無法復原！<br>(如果您想保留進度，請先點擊「備份進度」)', '確定重置', '取消', () => {
            localStorage.removeItem('A1MoversState');
            window.location.reload();
        });
    },

    downloadSaveFile() {
        const dataStr = JSON.stringify(this.state, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const date = new Date().toISOString().split('T')[0];
        a.href = url;
        a.download = `A1_Movers_Save_${date}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        this.ui.showModal("備份成功", "進度已成功備份下載！請妥善保存該 JSON 檔案。");
    },

    handleSaveFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const importedState = JSON.parse(e.target.result);
                if (importedState && typeof importedState === 'object') {
                    this.ui.showConfirm('讀取進度', '確定要讀取此進度檔嗎？目前的進度將會被覆蓋！', '確定讀取', '取消', () => {
                        localStorage.setItem('A1MoversState', JSON.stringify(importedState));
                        this.ui.showModal('讀取成功', '讀取成功！遊戲即將重新載入。', '確定', () => {
                            window.location.reload();
                        });
                    });
                } else {
                    this.ui.showModal('讀取失敗', '無效的存檔格式！');

            } catch (err) {
                this.ui.showModal('讀取失敗', '讀取失敗，存檔可能已損毀！');
                console.error(err);
            }
        };
        reader.readAsText(file);
        // Reset input
        event.target.value = '';
    },

        if (screenId === 'map') {
            this.renderMap();
            this.checkDailyLogin();
            this.checkAllEvolutions();
        }
    },

    play8BitSound(type) {
        if (!this.state.soundEnabled) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        // High quality DQ-style synths
        const now = audioCtx.currentTime;
        
        if (type === 'correct') {
            // Magical chime (major chord harp/bell)
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                gain.gain.setValueAtTime(0, now + (i * 0.05));
                gain.gain.linearRampToValueAtTime(0.15, now + (i * 0.05) + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + (i * 0.05) + 0.6);
                
                osc.start(now + (i * 0.05));
                osc.stop(now + (i * 0.05) + 1);
            });
        } else if (type === 'wrong') {
            // Sword slash / physical hit (noise burst)
            const bufferSize = audioCtx.sampleRate * 0.2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, now);
            filter.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start(now);
        } else if (type === 'win') {
            // Level Up / Victory fanfare (brass-like synth)
            const freqs = [440, 554.37, 659.25, 880];
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 2000;
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                const t = now + (i * 0.15);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.8);
                
                osc.start(t);
                osc.stop(t + 1);
            });
        }
    },

    preWarmAudio() {
        if (!this.state.soundEnabled) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0;
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.01);
            
            // 移除這裡自動播放 BGM 的邏輯，避免在不需要 BGM 的主頁/地圖也播音樂
        } catch (e) {}
    },

    // TTS 英文語音偵測
    detectTTS() {
        if (typeof speechSynthesis === 'undefined') {
            this.hasTTSEnglish = false;
            return;
        }
        
        const checkVoices = () => {
            if (typeof speechSynthesis === 'undefined') return;
            const voices = speechSynthesis.getVoices();
            this.hasTTSEnglish = voices.some(v => v.lang.startsWith('en'));
            if (this.hasTTSEnglish) {
                // Find a preferred high quality voice
                this.preferredVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Female') || v.name.includes('Hazel') || v.name.includes('Zira'))) 
                                   || voices.find(v => v.lang.startsWith('en-GB')) 
                                   || voices.find(v => v.lang.startsWith('en'));
            } else {
                // 若無英文語音，禁用發音按鈕
                document.querySelectorAll('[onclick*="studyPlayAudio"]').forEach(b => {
                    b.style.opacity = 0.4;
                    b.title = '此裝置無英文語音';
                });
            }
        };
        if (speechSynthesis.getVoices().length > 0) {
            checkVoices();
        } else {
            speechSynthesis.addEventListener('voiceschanged', checkVoices, { once: true });
        }
    },

    // === 每日登入獎勵（Phase 3）===
    checkDailyLogin() {
        const today = this.SRS.today();
        if (this.state.lastLogin === today) return; // 今天已領過
        
        // 計算連續登入
        if (this.state.lastLogin) {
            const lastDate = new Date(this.state.lastLogin);
            const todayDate = new Date(today);
            const diffDays = Math.round((todayDate - lastDate) / 86400000);
            if (diffDays === 1) {
                this.state.streak++;
            } else {
                this.state.streak = 1;
            }
        } else {
            this.state.streak = 1;
        }
        
        this.state.gold += 10;
        // 連續 3 天以上：下場野戰必遇異色
        if (this.state.streak >= 3) {
            this.state.shinyNextBattle = true;
        }
        // Generate Daily Quests
        this.state.dailyQuests = this.generateDailyQuests();
        
        this.state.lastLogin = today;
        this.saveState();
        
        // 顯示每日獎勵彈窗
        this.showDailyRewardPopup();

                    this.ui.showToast(`✅ 每日任務完成: ${q.desc}！請至儀表板領取獎勵！`);

        if (changed) this.saveState();

            this.state.gold += q.reward;
